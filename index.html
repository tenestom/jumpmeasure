<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JumpMeasure</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      position: relative;
    }

    h1 {
      position: absolute;
      top: calc(20px + env(safe-area-inset-top, 0px));
      left: calc(20px + env(safe-area-inset-left, 0px));
      font-size: 0.9rem;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.6;
      z-index: 10;
      pointer-events: none;
    }

    #videoContainer {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100vw;
      height: calc(100vw * 9 / 16);
      max-height: 100vh;
      max-width: calc(100vh * 16 / 9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      background: #000;
      overflow: hidden;
    }

    video {
      display: none;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    #startBtn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 112, 243, 0.4);
      transition: transform 0.2s;
    }

    #startBtn:hover {
      background: #005bb5;
      transform: translate(-50%, -50%) scale(1.05);
    }

    #cameraSelect {
      position: absolute;
      top: 50px;
      left: 20px;
      z-index: 50;
      padding: 0.5rem;
      font-size: 0.8rem;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(5px);
      color: #fff;
      display: none;
      width: auto;
      min-width: 150px;
    }

    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 110;
      background: none;
      padding: 0;
      color: #f55;
      font-size: 0.9rem;
      pointer-events: none;
      text-align: center;
      max-width: 80%;
    }

    #recordControls {
      position: absolute;
      bottom: calc(25px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 0.8rem;
      padding: 12px 20px;
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 100;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      justify-content: flex-start;
      align-items: center;
      width: auto;
      max-width: 92vw;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      scrollbar-width: none;
      margin-bottom: env(safe-area-inset-bottom, 0px);
    }

    #recordControls::-webkit-scrollbar {
      display: none;
    }

    #recordControls button {
      padding: 0.7rem 1.1rem;
      font-size: 0.9rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #fff;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #recordControls button:hover {
      opacity: 0.8;
    }

    #recordControls button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    #recordBtn  { background: #c0392b; font-weight: bold; }
    #stopBtn    { background: #444; }
    #liveBtn    { background: #0070f3; }
    #calibBtn   { background: #e67e22; }
    #clearCalibBtn { background: #d35400; }

    #scrubberBar {
      position: absolute;
      bottom: calc(90px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      max-width: 700px;
      display: none;           /* shown only in replay mode */
      align-items: center;
      z-index: 100;
    }

    #scrubber {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.25);
      outline: none;
      cursor: pointer;
    }
    #scrubber::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    #scrubber::-moz-range-thumb {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      cursor: pointer;
      border: none;
    }
    /* Filled track left of thumb */
    #scrubber::-webkit-slider-runnable-track {
      height: 6px;
      border-radius: 3px;
    }

    #frameInfo {
      position: absolute;
      top: calc(20px + env(safe-area-inset-top, 0px));
      right: calc(20px + env(safe-area-inset-right, 0px));
      margin: 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.8rem;
      color: #fff;
      background: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 6px;
      backdrop-filter: blur(5px);
      z-index: 10;
      pointer-events: none;
    }

    #hud-top {
      position: absolute;
      top: calc(50px + env(safe-area-inset-top, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      text-align: center;
      pointer-events: none;
    }

    .hud-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      opacity: 0.5;
      margin-bottom: 4px;
    }

    #measurementValue {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    #homeScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .intro-container {
      position: relative;
      width: 100vw;
      height: calc(100vw * 9 / 16);
      max-height: 100vh;
      max-width: calc(100vh * 16 / 9);
      background: #fff;
    }

    .intro-img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

    #homeStartBtn {
      position: absolute;
      bottom: 4.1%;
      left: 2.1%;
      width: 40.2%;
      min-width: 140px;
      height: 6.8%;
      min-height: 44px;
      background: #002244;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: clamp(0.7rem, 2vw, 1.1rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2001;
      padding: 5px;
    }

    #homeStartBtn:hover {
      background: #003366;
    }

    #appScreen {
      display: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="homeScreen">
    <div class="intro-container">
      <img src="ChatGPT Image 1 maj 2026 17_49_06.png" class="intro-img">
      <button id="homeStartBtn">Start Measuring</button>
    </div>
  </div>

  <div id="appScreen">
    <h1>JumpMeasure</h1>
    <div id="hud-top">
      <div class="hud-label">Measurement</div>
      <div id="measurementValue">--.-- m</div>
    </div>
    <div id="videoContainer">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>
    <button id="startBtn">Start Camera</button>
    <select id="cameraSelect"></select>
    <div id="recordControls">
      <button id="recordBtn">⏺ Record</button>
      <button id="stopBtn" disabled>⏹ Stop</button>
      <button id="liveBtn" disabled>▶ Live</button>
      <button id="calibBtn">🎯 Calibrate</button>
      <button id="clearCalibBtn">Clear Calib</button>
    </div>
    <div id="scrubberBar">
      <input type="range" id="scrubber" min="0" value="0" step="1">
    </div>
    <p id="frameInfo"></p>
    <p id="error"></p>
  </div>

  <div id="calibOverlay" style="display:none; position:fixed; z-index:9999; pointer-events:auto;">
    <div style="background:#1a1a1a; padding:15px; border-radius:15px; text-align:center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 160px;">
      <p style="margin-bottom:10px; font-size: 0.8rem; font-weight: bold; opacity: 0.8;">Distance (m)</p>
      <input type="number" id="calibInput" step="0.01" inputmode="decimal" placeholder="0.00" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:#000; color:#fff; font-size:1.1rem; text-align:center; margin-bottom:12px;">
      <div style="display:flex; gap:8px; justify-content:center;">
        <button id="calibCancel" style="padding:8px 12px; font-size: 0.8rem; border-radius:8px; border:none; background:#333; color:#fff; cursor:pointer;">Esc</button>
        <button id="calibOk" style="padding:8px 12px; font-size: 0.8rem; border-radius:8px; border:none; background:#0070f3; color:#fff; cursor:pointer; font-weight:bold;">OK</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const errorEl = document.getElementById('error');
    const cameraSelect = document.getElementById('cameraSelect');
    const recordControls = document.getElementById('recordControls');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn   = document.getElementById('stopBtn');
    const liveBtn   = document.getElementById('liveBtn');
    const calibBtn  = document.getElementById('calibBtn');
    const clearCalibBtn = document.getElementById('clearCalibBtn');
    const scrubberBar = document.getElementById('scrubberBar');
    const scrubber    = document.getElementById('scrubber');
    const frameInfo = document.getElementById('frameInfo');
    const measurementValue = document.getElementById('measurementValue');
    const calibOverlay = document.getElementById('calibOverlay');
    const calibInput = document.getElementById('calibInput');
    const calibOk = document.getElementById('calibOk');
    const calibCancel = document.getElementById('calibCancel');
    
    const homeScreen = document.getElementById('homeScreen');
    const appScreen = document.getElementById('appScreen');
    const homeStartBtn = document.getElementById('homeStartBtn');

    // App state switch
    homeStartBtn.addEventListener('click', () => {
      homeScreen.style.display = 'none';
      appScreen.style.display = 'block';
      // Ensure canvas is correctly sized on first show
      resizeCanvas();
    });

    // Offscreen canvas for frame capture
    const offscreen = document.createElement('canvas');
    const offCtx = offscreen.getContext('2d');

    let rafId = null;
    let lineX = null;
    let draggingX = false;

    // Recording state
    let recording = false;
    let frames = [];       // array of ImageData
    let replayMode = false;
    let replayIndex = 0;
    
    // Calibration state
    let calibrateMode = false;
    let calibPoints = []; // [{pixelX: number, pixelY: number, meters: number}]

    // Zoom state
    let zoomLevel = 1;       // 1 = no zoom, >1 = zoomed in
    const ZOOM_MIN = 1;
    const ZOOM_MAX = 8;
    // Pan offset in CSS pixels relative to the canvas element's top-left
    let panX = 0;
    let panY = 0;
    // Pinch tracking
    let lastPinchDist = null;  // null when not pinching
    let lastPinchMidX = 0;
    let lastPinchMidY = 0;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('load', resizeCanvas);

    // Returns the unzoomed image layout (before zoom transform is applied).
    // ox/oy/vw/vh are in CSS pixels referring to where the image sits inside
    // the canvas element at zoom=1.
    function getBaseLayout() {
      const rect = canvas.getBoundingClientRect();
      const fw = video.videoWidth  || (replayMode && frames.length > 0 ? frames[replayIndex].width  : 0);
      const fh = video.videoHeight || (replayMode && frames.length > 0 ? frames[replayIndex].height : 0);

      if (!fw || !fh) {
        return { ox: 0, oy: 0, vw: rect.width, vh: rect.height, cw: rect.width, ch: rect.height };
      }
      const videoAspect = fw / fh;
      const canvasAspect = rect.width / rect.height;
      let drawW, drawH, offsetX, offsetY;
      if (videoAspect > canvasAspect) {
        drawW = rect.width;  drawH = rect.width / videoAspect;
        offsetX = 0;         offsetY = (rect.height - drawH) / 2;
      } else {
        drawH = rect.height; drawW = rect.height * videoAspect;
        offsetX = (rect.width - drawW) / 2; offsetY = 0;
      }
      return { ox: offsetX, oy: offsetY, vw: drawW, vh: drawH, cw: rect.width, ch: rect.height };
    }

    // Clamp panX/panY so we can't pan past the image edges
    function clampPan() {
      const rect = canvas.getBoundingClientRect();
      const { ox, oy, vw, vh } = getBaseLayout();
      // Zoomed image dimensions
      const zw = vw * zoomLevel;
      const zh = vh * zoomLevel;
      // Maximum allowed pan so the image never shows blank outside its bounds
      const maxPanX = Math.max(0, (zw - rect.width)  / 2 + ox * zoomLevel);
      const maxPanY = Math.max(0, (zh - rect.height) / 2 + oy * zoomLevel);
      panX = Math.max(-maxPanX, Math.min(maxPanX, panX));
      panY = Math.max(-maxPanY, Math.min(maxPanY, panY));
    }

    // Apply zoom around a focal point given in client coordinates.
    // localX/Y must be relative to the canvas CENTER to match the transform.
    function applyZoom(newZoom, focalClientX, focalClientY) {
      const rect = canvas.getBoundingClientRect();
      // Focal point relative to canvas CENTER (not top-left)
      const localX = focalClientX - rect.left - rect.width  / 2;
      const localY = focalClientY - rect.top  - rect.height / 2;
      // Keep the pixel under the focal point stationary
      const ratio = newZoom / zoomLevel;
      panX = localX - ratio * (localX - panX);
      panY = localY - ratio * (localY - panY);
      zoomLevel = newZoom;
      clampPan();
    }

    // Convert a client-space point to image-relative (0..1) coordinates,
    // accounting for the current zoom/pan transform.
    function getCanvasPoint(clientX, clientY) {
      const rect  = canvas.getBoundingClientRect();
      const { ox, oy, vw, vh } = getBaseLayout();
      // Canvas-local coords (CSS pixels)
      const localX = clientX - rect.left;
      const localY = clientY - rect.top;
      // Invert the zoom/pan transform: canvas origin = rect centre + panOffset
      const cx = rect.width  / 2;
      const cy = rect.height / 2;
      // Point in zoomed space relative to centre
      const relX = localX - cx - panX + cx;
      const relY = localY - cy - panY + cy;
      // Unzoom back to base layout
      const baseX = (relX - cx) / zoomLevel + cx;
      const baseY = (relY - cy) / zoomLevel + cy;
      // Subtract image offset so (0,0) = top-left of image
      return {
        x:  baseX - ox,
        y:  baseY - oy,
        vw, vh,
        ox, oy
      };
    }

    function getCanvasX(clientX) {
      const pt = getCanvasPoint(clientX, 0);
      return pt.x / pt.vw;
    }

    function getCanvasY(clientY) {
      const pt = getCanvasPoint(0, clientY);
      return pt.y / pt.vh;
    }

    function getInterpolatedValue(pixelX, points) {
      if (!points || points.length === 0) return null;

      // Sort points by pixelX without modifying the original array
      const sortedPoints = [...points].sort((a, b) => a.pixelX - b.pixelX);

      // Handle cases where pixelX is outside the range (clamping)
      if (pixelX <= sortedPoints[0].pixelX) return sortedPoints[0].meters;
      if (pixelX >= sortedPoints[sortedPoints.length - 1].pixelX) {
        return sortedPoints[sortedPoints.length - 1].meters;
      }

      // Find the segment and interpolate
      for (let i = 0; i < sortedPoints.length - 1; i++) {
        const p1 = sortedPoints[i];
        const p2 = sortedPoints[i + 1];

        if (pixelX >= p1.pixelX && pixelX <= p2.pixelX) {
          const gap = p2.pixelX - p1.pixelX;
          if (gap === 0) return p1.meters;
          const t = (pixelX - p1.pixelX) / gap;
          return p1.meters + t * (p2.meters - p1.meters);
        }
      }

      return null;
    }


    function drawLine() {
      const pt = getCanvasPoint(0, 0); // Get layout info
      const ox = pt.ox;
      const oy = pt.oy;
      const vw = pt.vw;
      const vh = pt.vh;


      // Draw Vertical Line (X-axis)
      if (lineX !== null) {
        const px = ox + lineX * vw;
        ctx.beginPath();
        ctx.moveTo(px, oy);
        ctx.lineTo(px, oy + vh);
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 2;
        ctx.stroke();


        // Measurement display
        const meters = getInterpolatedValue(lineX * vw, calibPoints);
        if (meters !== null) {
          const finalMeters = meters;

          measurementValue.textContent = finalMeters.toFixed(2) + ' m';
          
          ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
          ctx.font = '14px sans-serif';
          ctx.fillText(finalMeters.toFixed(2) + 'm', px + 10, oy + 25);
        } else {
          measurementValue.textContent = '--.-- m';
        }
      } else {
        measurementValue.textContent = '--.-- m';
      }
    }

    function drawCalibrationPoints() {
      const pt = getCanvasPoint(0, 0);
      const ox = pt.ox;
      const oy = pt.oy;

      calibPoints.forEach(p => {
        const px = ox + p.pixelX;
        const py = oy + p.pixelY;
        
        // Draw small circle at actual position
        ctx.beginPath();
        ctx.arc(px, py, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#2ecc71';
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw meter value above circle
        ctx.fillStyle = 'white';
        ctx.font = '12px sans-serif';
        ctx.shadowBlur = 4;
        ctx.shadowColor = 'black';
        ctx.textAlign = 'center';
        ctx.fillText(p.meters + ' m', px, py - 10);
        ctx.textAlign = 'start';
        ctx.shadowBlur = 0;
      });
    }

    // Wraps drawing with zoom/pan transform applied around the canvas centre
    function withZoomTransform(fn) {
      const rect = canvas.getBoundingClientRect();
      const cx = rect.width  / 2;
      const cy = rect.height / 2;
      ctx.save();
      ctx.translate(cx + panX, cy + panY);
      ctx.scale(zoomLevel, zoomLevel);
      ctx.translate(-cx, -cy);
      fn();
      ctx.restore();
    }

    function drawFrame() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);

      if (!replayMode && video.readyState >= 2) {
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        if (!vw || !vh) {
          rafId = requestAnimationFrame(drawFrame);
          return;
        }

        const { ox: offsetX, oy: offsetY, vw: drawW, vh: drawH } = getBaseLayout();

        withZoomTransform(() => {
          ctx.drawImage(video, 0, 0, vw, vh, offsetX, offsetY, drawW, drawH);
        });

        // Capture frame during recording (always at native resolution)
        if (recording) {
          offscreen.width = vw;
          offscreen.height = vh;
          offCtx.drawImage(video, 0, 0);
          frames.push(offCtx.getImageData(0, 0, offscreen.width, offscreen.height));
        }

        withZoomTransform(() => { drawLine(); drawCalibrationPoints(); });

      } else if (replayMode && frames.length > 0) {
        const frame = frames[replayIndex];
        offscreen.width  = frame.width;
        offscreen.height = frame.height;
        offCtx.putImageData(frame, 0, 0);

        const { ox: offsetX, oy: offsetY, vw: drawW, vh: drawH } = getBaseLayout();

        withZoomTransform(() => {
          ctx.drawImage(offscreen, 0, 0, frame.width, frame.height, offsetX, offsetY, drawW, drawH);
        });
        withZoomTransform(() => { drawLine(); drawCalibrationPoints(); });
      }
      rafId = requestAnimationFrame(drawFrame);
    }

    function showReplayFrame() {
      const rect = canvas.getBoundingClientRect();
      const frame = frames[replayIndex];
      offscreen.width  = frame.width;
      offscreen.height = frame.height;
      offCtx.putImageData(frame, 0, 0);
      ctx.clearRect(0, 0, rect.width, rect.height);

      const { ox: offsetX, oy: offsetY, vw: drawW, vh: drawH } = getBaseLayout();
      withZoomTransform(() => {
        ctx.drawImage(offscreen, 0, 0, frame.width, frame.height, offsetX, offsetY, drawW, drawH);
      });
      withZoomTransform(() => { drawLine(); drawCalibrationPoints(); });

      // Sync scrubber thumb position
      scrubber.value = replayIndex;
      frameInfo.textContent = `Frame ${replayIndex + 1} / ${frames.length}`;
    }

    async function startCamera(deviceId) {
      const constraints = { 
        video: deviceId ? { deviceId: { exact: deviceId } } : true, 
        audio: false 
      };
      try {
        if (video.srcObject) {
          video.srcObject.getTracks().forEach(t => t.stop());
        }
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        await new Promise(resolve => {
          video.onloadedmetadata = () => resolve();
        });
        
        await video.play();

        if (!rafId) drawFrame();
      } catch (err) {
        errorEl.textContent = 'Camera error: ' + err.message;
      }
    }

    async function populateCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      cameraSelect.innerHTML = '';
      cameras.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || 'Camera ' + (i + 1);
        cameraSelect.appendChild(opt);
      });
      cameraSelect.style.display = cameras.length > 1 ? 'block' : 'none';
    }

    startBtn.addEventListener('click', async () => {
      errorEl.textContent = '';
      await startCamera(null);
      await populateCameras();
      startBtn.style.display = 'none';
      recordControls.style.display = 'flex';
    });

    cameraSelect.addEventListener('change', () => {
      startCamera(cameraSelect.value);
    });

    recordBtn.addEventListener('click', () => {
      frames = [];
      recording = true;
      replayMode = false;
      recordBtn.disabled = true;
      stopBtn.disabled = false;
      liveBtn.disabled = true;
      scrubberBar.style.display = 'none';
      frameInfo.textContent = 'Recording...';
    });

    stopBtn.addEventListener('click', () => {
      recording = false;
      replayMode = true;
      replayIndex = frames.length - 1;
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      liveBtn.disabled = false;
      if (frames.length > 0) {
        scrubber.max = frames.length - 1;
        scrubber.value = replayIndex;
        scrubberBar.style.display = 'flex';
        showReplayFrame();
      } else {
        frameInfo.textContent = 'No frames captured.';
      }
    });

    prevBtn.addEventListener('click', () => {
      if (replayIndex > 0) { replayIndex--; showReplayFrame(); }
    });

    nextBtn.addEventListener('click', () => {
      if (replayIndex < frames.length - 1) { replayIndex++; showReplayFrame(); }
    });

    // Scrubber — drag to scrub through frames
    scrubber.addEventListener('input', () => {
      replayIndex = parseInt(scrubber.value, 10);
      showReplayFrame();
    });

    liveBtn.addEventListener('click', () => {
      replayMode = false;
      recording = false;
      scrubberBar.style.display = 'none';
      liveBtn.disabled = true;
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      frameInfo.textContent = '';
    });

    calibBtn.addEventListener('click', () => {
      calibrateMode = !calibrateMode;
      calibBtn.style.background = calibrateMode ? '#2ecc71' : '#e67e22';
      frameInfo.textContent = calibrateMode ? 'Calibration ON. Click to add points.' : '';
    });

    clearCalibBtn.addEventListener('click', () => {
      calibPoints = [];
    });

    function handleInteraction(clientX, clientY) {
      const pt = getCanvasPoint(clientX, clientY);
      const cx = pt.x;
      const cy = pt.y;

      if (calibrateMode) {
        // Position overlay near click
        calibOverlay.style.display = 'block';
        calibOverlay.style.left = Math.min(window.innerWidth - 180, Math.max(10, clientX - 80)) + 'px';
        calibOverlay.style.top = Math.min(window.innerHeight - 150, Math.max(10, clientY - 120)) + 'px';
        
        calibInput.value = '';
        setTimeout(() => {
          calibInput.focus();
          calibInput.select();
        }, 0);

        const handleOk = () => {
          let m = calibInput.value;
          if (m !== '' && !isNaN(parseFloat(m))) {
            calibPoints.push({ pixelX: cx, pixelY: cy, meters: parseFloat(m) });
            calibPoints.sort((a, b) => a.pixelX - b.pixelX);
          }
          cleanup();
        };

        const cleanup = () => {
          calibOverlay.style.display = 'none';
          calibOk.removeEventListener('click', handleOk);
          calibCancel.removeEventListener('click', cleanup);
          window.removeEventListener('keydown', handleKey);
        };

        const handleKey = (e) => {
          if (e.key === 'Enter') handleOk();
          if (e.key === 'Escape') cleanup();
        };

        calibOk.addEventListener('click', handleOk);
        calibCancel.addEventListener('click', cleanup);
        window.addEventListener('keydown', handleKey);
      } else {
        draggingX = true;
        lineX = cx / pt.vw;
      }
    }

    // Mouse events
    canvas.addEventListener('mousedown', e => { handleInteraction(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', e => { 
      if (draggingX && !calibrateMode) {
        lineX = getCanvasX(e.clientX);
      }
    });
    canvas.addEventListener('mouseup', () => { draggingX = false; });

    // Touch events — single finger drags the line, two fingers pinch-to-zoom
    canvas.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        // Begin pinch: record initial distance and mid-point
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        lastPinchDist = Math.hypot(dx, dy);
        lastPinchMidX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        lastPinchMidY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        draggingX = false;  // cancel any single-finger drag
      } else if (e.touches.length === 1) {
        lastPinchDist = null;
        handleInteraction(e.touches[0].clientX, e.touches[0].clientY);
      }
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (e.touches.length === 2) {
        // Pinch zoom
        const dx = e.touches[1].clientX - e.touches[0].clientX;
        const dy = e.touches[1].clientY - e.touches[0].clientY;
        const dist = Math.hypot(dx, dy);
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        if (lastPinchDist !== null) {
          const pinchRatio = dist / lastPinchDist;
          const newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel * pinchRatio));
          applyZoom(newZoom, midX, midY);
        }
        lastPinchDist = dist;
        lastPinchMidX = midX;
        lastPinchMidY = midY;
      } else if (e.touches.length === 1 && draggingX && !calibrateMode) {
        lineX = getCanvasX(e.touches[0].clientX);
      }
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      if (e.touches.length < 2) lastPinchDist = null;
      if (e.touches.length === 0) draggingX = false;
    });

    // Desktop: Ctrl + scroll wheel to zoom
    canvas.addEventListener('wheel', e => {
      if (!e.ctrlKey && !e.metaKey) return;
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;  // scroll down = zoom out
      const newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomLevel * delta));
      applyZoom(newZoom, e.clientX, e.clientY);
    }, { passive: false });

  </script>
</body>
</html>
