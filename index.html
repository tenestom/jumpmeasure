<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JumpMeasure</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="homeScreen">
    <div class="intro-container">
      <img src="ChatGPT Image 1 maj 2026 17_49_06.png" class="intro-img">
      <button id="homeStartBtn">Start Measuring</button>
    </div>
  </div>

  <div id="appScreen">
    <h1>JumpMeasure</h1>
    <div id="hud-top">
      <div class="hud-label">Measurement</div>
      <div id="measurementValue">--.-- m</div>
    </div>
    <div id="videoContainer">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
    </div>
    <button id="startBtn">Start Camera</button>
    <button id="uploadBtn">Upload Clip</button>
    <input type="file" id="uploadInput" accept="video/*" style="display:none;">
    <select id="cameraSelect"></select>
    <div id="recordControls">
      <button id="recordBtn">⏺ Record</button>
      <button id="stopBtn" disabled>⏹ Stop</button>
      <button id="playPauseBtn" style="display:none;">⏸ Pause</button>
      <button id="liveBtn" disabled>▶ Live</button>
      <button id="calibBtn">🎯 Calibrate</button>
      <button id="clearCalibBtn">Clear Calib</button>
      <button id="aiDetectBtn">🤖 AI Detect</button>
      <button id="aiFeedbackBtn" style="display:none;">✅ Send Correction</button>
    </div>
    <div id="scrubberBar">
      <input type="range" id="scrubber" min="0" value="0" step="1">
    </div>
    <div id="aiStatus"></div>
    <p id="frameInfo"></p>
    <p id="error"></p>
  </div>

  <div id="calibOverlay" style="display:none; position:fixed; z-index:9999; pointer-events:auto;">
    <div style="background:#1a1a1a; padding:15px; border-radius:15px; text-align:center; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 160px;">
      <p style="margin-bottom:10px; font-size: 0.8rem; font-weight: bold; opacity: 0.8;">Distance (m)</p>
      <input type="number" id="calibInput" step="0.01" inputmode="decimal" placeholder="0.00" style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:#000; color:#fff; font-size:1.1rem; text-align:center; margin-bottom:12px;">
      <div style="display:flex; gap:8px; justify-content:center;">
        <button id="calibCancel" style="padding:8px 12px; font-size: 0.8rem; border-radius:8px; border:none; background:#333; color:#fff; cursor:pointer;">Esc</button>
        <button id="calibOk" style="padding:8px 12px; font-size: 0.8rem; border-radius:8px; border:none; background:#0070f3; color:#fff; cursor:pointer; font-weight:bold;">OK</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
  <script type="module" src="js/app.js?v=3"></script>
</body>
</html>
