<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JumpMeasure</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    #videoContainer {
      position: relative;
      width: 100%;
      max-width: 720px;
    }

    video {
      display: none;
    }

    #canvas {
      width: 100%;
      border-radius: 8px;
      display: block;
      background: #000;
    }

    #startBtn {
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #005bb5;
    }

    #cameraSelect {
      margin-top: 1rem;
      padding: 0.5rem 0.8rem;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
      background: #222;
      color: #fff;
      display: none;
      width: 100%;
      max-width: 720px;
    }

    #error {
      margin-top: 1rem;
      color: #f55;
      font-size: 0.9rem;
    }

    #recordControls {
      display: none;
      margin-top: 1rem;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 720px;
    }

    #recordControls button {
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #fff;
    }

    #recordBtn  { background: #c0392b; }
    #stopBtn    { background: #555; }
    #prevBtn, #nextBtn { background: #333; }
    #liveBtn    { background: #0070f3; }
    #calibBtn   { background: #e67e22; }
    #clearCalibBtn { background: #d35400; }

    #frameInfo {
      margin-top: 0.4rem;
      font-size: 0.85rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>JumpMeasure</h1>
  <div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <button id="startBtn">Start Camera</button>
  <select id="cameraSelect"></select>
  <div id="recordControls">
    <button id="recordBtn">⏺ Record</button>
    <button id="stopBtn" disabled>⏹ Stop</button>
    <button id="prevBtn" disabled>◀ Prev</button>
    <button id="nextBtn" disabled>Next ▶</button>
    <button id="liveBtn" disabled>▶ Live</button>
    <button id="calibBtn">🎯 Calibrate</button>
    <button id="clearCalibBtn">Clear Calib</button>
  </div>
  <p id="frameInfo"></p>
  <p id="error"></p>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const errorEl = document.getElementById('error');
    const cameraSelect = document.getElementById('cameraSelect');
    const recordControls = document.getElementById('recordControls');
    const recordBtn = document.getElementById('recordBtn');
    const stopBtn = document.getElementById('stopBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const liveBtn = document.getElementById('liveBtn');
    const calibBtn = document.getElementById('calibBtn');
    const clearCalibBtn = document.getElementById('clearCalibBtn');
    const frameInfo = document.getElementById('frameInfo');

    // Offscreen canvas for frame capture
    const offscreen = document.createElement('canvas');
    const offCtx = offscreen.getContext('2d');

    let rafId = null;
    let lineX = null;
    let dragging = false;

    // Recording state
    let recording = false;
    let frames = [];       // array of ImageData
    let replayMode = false;
    let replayIndex = 0;
    
    // Calibration state
    let calibrateMode = false;
    let calibPoints = []; // [{x: fraction, meters: value}]

    function getCanvasX(clientX) {
      const rect = canvas.getBoundingClientRect();
      return (clientX - rect.left) / rect.width;
    }

    function getInterpolatedValue(pixelX, points) {
      if (!points || points.length === 0) return null;

      // Sort points by pixelX without modifying the original array
      const sortedPoints = [...points].sort((a, b) => a.pixelX - b.pixelX);

      // Handle cases where pixelX is outside the range (clamping)
      if (pixelX <= sortedPoints[0].pixelX) return sortedPoints[0].meters;
      if (pixelX >= sortedPoints[sortedPoints.length - 1].pixelX) {
        return sortedPoints[sortedPoints.length - 1].meters;
      }

      // Find the segment and interpolate
      for (let i = 0; i < sortedPoints.length - 1; i++) {
        const p1 = sortedPoints[i];
        const p2 = sortedPoints[i + 1];

        if (pixelX >= p1.pixelX && pixelX <= p2.pixelX) {
          const gap = p2.pixelX - p1.pixelX;
          if (gap === 0) return p1.meters;
          const t = (pixelX - p1.pixelX) / gap;
          return p1.meters + t * (p2.meters - p1.meters);
        }
      }

      return null;
    }

    function drawLine() {
      if (lineX !== null) {
        const px = lineX * canvas.width;
        ctx.beginPath();
        ctx.moveTo(px, 0);
        ctx.lineTo(px, canvas.height);
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    function drawFrame() {
      if (!replayMode && video.readyState >= 2) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // Capture frame during recording
        if (recording) {
          offscreen.width = canvas.width;
          offscreen.height = canvas.height;
          offCtx.drawImage(video, 0, 0);
          frames.push(offCtx.getImageData(0, 0, offscreen.width, offscreen.height));
        }

        drawLine();
      } else if (replayMode && frames.length > 0) {
        const frame = frames[replayIndex];
        ctx.putImageData(frame, 0, 0);
        drawLine();
      }
      rafId = requestAnimationFrame(drawFrame);
    }

    function showReplayFrame() {
      const frame = frames[replayIndex];
      canvas.width = frame.width;
      canvas.height = frame.height;
      ctx.putImageData(frame, 0, 0);
      drawLine();
      frameInfo.textContent = `Frame ${replayIndex + 1} / ${frames.length}`;
      prevBtn.disabled = replayIndex === 0;
      nextBtn.disabled = replayIndex === frames.length - 1;
    }

    async function startCamera(deviceId) {
      const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : true, audio: false };
      try {
        if (video.srcObject) {
          video.srcObject.getTracks().forEach(t => t.stop());
        }
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        if (!rafId) drawFrame();
      } catch (err) {
        errorEl.textContent = 'Camera error: ' + err.message;
      }
    }

    async function populateCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      cameraSelect.innerHTML = '';
      cameras.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || 'Camera ' + (i + 1);
        cameraSelect.appendChild(opt);
      });
      cameraSelect.style.display = cameras.length > 1 ? 'block' : 'none';
    }

    startBtn.addEventListener('click', async () => {
      errorEl.textContent = '';
      await startCamera(null);
      await populateCameras();
      startBtn.style.display = 'none';
      recordControls.style.display = 'flex';
    });

    cameraSelect.addEventListener('change', () => {
      startCamera(cameraSelect.value);
    });

    recordBtn.addEventListener('click', () => {
      frames = [];
      recording = true;
      replayMode = false;
      recordBtn.disabled = true;
      stopBtn.disabled = false;
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      liveBtn.disabled = true;
      frameInfo.textContent = 'Recording...';
    });

    stopBtn.addEventListener('click', () => {
      recording = false;
      replayMode = true;
      replayIndex = frames.length - 1;
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      liveBtn.disabled = false;
      if (frames.length > 0) showReplayFrame();
      else frameInfo.textContent = 'No frames captured.';
    });

    prevBtn.addEventListener('click', () => {
      if (replayIndex > 0) { replayIndex--; showReplayFrame(); }
    });

    nextBtn.addEventListener('click', () => {
      if (replayIndex < frames.length - 1) { replayIndex++; showReplayFrame(); }
    });

    liveBtn.addEventListener('click', () => {
      replayMode = false;
      recording = false;
      prevBtn.disabled = true;
      nextBtn.disabled = true;
      liveBtn.disabled = true;
      recordBtn.disabled = false;
      stopBtn.disabled = true;
      frameInfo.textContent = '';
    });

    calibBtn.addEventListener('click', () => {
      calibrateMode = !calibrateMode;
      calibBtn.style.background = calibrateMode ? '#2ecc71' : '#e67e22';
      frameInfo.textContent = calibrateMode ? 'Calibration ON. Click to add points.' : '';
    });

    clearCalibBtn.addEventListener('click', () => {
      calibPoints = [];
    });

    function handleInteraction(clientX) {
      if (calibrateMode) {
        let x = getCanvasX(clientX);
        let m = prompt('Enter real-world distance for this point (in meters):');
        if (m !== null && !isNaN(parseFloat(m))) {
          calibPoints.push({ x: x, meters: parseFloat(m) });
          calibPoints.sort((a, b) => a.x - b.x);
        }
      } else {
        dragging = true;
        lineX = getCanvasX(clientX);
      }
    }

    // Mouse events
    canvas.addEventListener('mousedown', e => { handleInteraction(e.clientX); });
    canvas.addEventListener('mousemove', e => { if (dragging && !calibrateMode) lineX = getCanvasX(e.clientX); });
    canvas.addEventListener('mouseup', () => { dragging = false; });

    // Touch events
    canvas.addEventListener('touchstart', e => { 
      e.preventDefault(); 
      handleInteraction(e.touches[0].clientX); 
    }, { passive: false });
    canvas.addEventListener('touchmove', e => { 
      e.preventDefault(); 
      if (dragging && !calibrateMode) lineX = getCanvasX(e.touches[0].clientX); 
    }, { passive: false });
    canvas.addEventListener('touchend', () => { dragging = false; });
  </script>
</body>
</html>
