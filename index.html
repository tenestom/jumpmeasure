<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JumpMeasure</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      color: #fff;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    #videoContainer {
      position: relative;
      width: 100%;
      max-width: 720px;
    }

    video {
      display: none;
    }

    #canvas {
      width: 100%;
      border-radius: 8px;
      display: block;
      background: #000;
    }

    #startBtn {
      margin-top: 1rem;
      padding: 0.6rem 1.4rem;
      font-size: 1rem;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #startBtn:hover {
      background: #005bb5;
    }

    #cameraSelect {
      margin-top: 1rem;
      padding: 0.5rem 0.8rem;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
      background: #222;
      color: #fff;
      display: none;
      width: 100%;
      max-width: 720px;
    }

    #error {
      margin-top: 1rem;
      color: #f55;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>JumpMeasure</h1>
  <div id="videoContainer">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <button id="startBtn">Start Camera</button>
  <select id="cameraSelect"></select>
  <p id="error"></p>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const errorEl = document.getElementById('error');
    const cameraSelect = document.getElementById('cameraSelect');

    let rafId = null;
    let lineX = null;   // position as fraction of canvas width (0–1)
    let dragging = false;

    function getCanvasX(clientX) {
      const rect = canvas.getBoundingClientRect();
      return (clientX - rect.left) / rect.width;
    }

    function drawFrame() {
      if (video.readyState >= 2) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        if (lineX !== null) {
          const px = lineX * canvas.width;
          ctx.beginPath();
          ctx.moveTo(px, 0);
          ctx.lineTo(px, canvas.height);
          ctx.strokeStyle = 'red';
          ctx.lineWidth = 2;
          ctx.stroke();
        }
      }
      rafId = requestAnimationFrame(drawFrame);
    }

    async function startCamera(deviceId) {
      const constraints = { video: deviceId ? { deviceId: { exact: deviceId } } : true, audio: false };
      try {
        if (video.srcObject) {
          video.srcObject.getTracks().forEach(t => t.stop());
        }
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        if (!rafId) drawFrame();
      } catch (err) {
        errorEl.textContent = 'Camera error: ' + err.message;
      }
    }

    async function populateCameras() {
      const devices = await navigator.mediaDevices.enumerateDevices();
      const cameras = devices.filter(d => d.kind === 'videoinput');
      cameraSelect.innerHTML = '';
      cameras.forEach((cam, i) => {
        const opt = document.createElement('option');
        opt.value = cam.deviceId;
        opt.textContent = cam.label || 'Camera ' + (i + 1);
        cameraSelect.appendChild(opt);
      });
      cameraSelect.style.display = cameras.length > 1 ? 'block' : 'none';
    }

    startBtn.addEventListener('click', async () => {
      errorEl.textContent = '';
      await startCamera(null);
      await populateCameras();
      startBtn.style.display = 'none';
    });

    cameraSelect.addEventListener('change', () => {
      startCamera(cameraSelect.value);
    });

    // Mouse events
    canvas.addEventListener('mousedown', e => { dragging = true; lineX = getCanvasX(e.clientX); });
    canvas.addEventListener('mousemove', e => { if (dragging) lineX = getCanvasX(e.clientX); });
    canvas.addEventListener('mouseup', () => { dragging = false; });

    // Touch events
    canvas.addEventListener('touchstart', e => { e.preventDefault(); dragging = true; lineX = getCanvasX(e.touches[0].clientX); }, { passive: false });
    canvas.addEventListener('touchmove', e => { e.preventDefault(); if (dragging) lineX = getCanvasX(e.touches[0].clientX); }, { passive: false });
    canvas.addEventListener('touchend', () => { dragging = false; });
  </script>
</body>
</html>
